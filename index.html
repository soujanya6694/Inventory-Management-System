<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            width:850px;
            background:white;
            border-radius:15px;
            display:flex;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .left{
            width:50%;
            padding:40px;
        }

        .left h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        .payment{
            margin-top:20px;
            margin-bottom:20px;
        }

        .payment label{
            font-weight:bold;
            color:#444;
        }

        .radio-group{
            margin-top:10px;
        }

        .radio-group input{
            margin-right:5px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .right{
            width:50%;
            background:#f4f4f4;
            padding:40px;
        }

        .right h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        #receipt{
            background:white;
            padding:20px;
            border-radius:10px;
            min-height:300px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        #receipt p{
            margin:10px 0;
            font-size:17px;
        }

        .success{
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- Left Side -->
        <div class="left">

            <h1>Inventory System</h1>

            <div class="input-box">
                <label>Product Name</label>
                <input type="text" id="name" placeholder="Enter Product Name">
            </div>

            <div class="input-box">
                <label>Price</label>
                <input type="number" id="price" placeholder="Enter Price">
            </div>

            <div class="input-box">
                <label>Quantity</label>
                <input type="number" id="qty" placeholder="Enter Quantity">
            </div>

            <div class="payment">

                <label>Payment Method</label>

                <div class="radio-group">
                    <input type="radio" name="payment" value="Cash"> Cash

                    <input type="radio" name="payment" value="Card"> Card

                    <input type="radio" name="payment" value="UPI"> UPI
                </div>

            </div>

            <button onclick="generateReceipt()">
                Process Payment
            </button>

        </div>

        <!-- Right Side -->
        <div class="right">

            <h2>Receipt</h2>

            <div id="receipt">

                <p>Your receipt will appear here...</p>

            </div>

        </div>

    </div>

    <script>

        function generateReceipt(){

            let name=document.getElementById("name").value;

            let price=document.getElementById("price").value;

            let qty=document.getElementById("qty").value;

            let payment=document.querySelector('input[name="payment"]:checked');

            if(name=="" || price=="" || qty==""){
                alert("Please fill all fields");
                return;
            }

            if(payment==null){
                alert("Please select payment method");
                return;
            }

            let total=price*qty;

            document.getElementById("receipt").innerHTML=`

                <p><b>Product Name:</b> ${name}</p>

                <p><b>Price:</b> ₹${price}</p>

                <p><b>Quantity:</b> ${qty}</p>

                <hr>

                <p><b>Total Amount:</b> ₹${total}</p>

                <p><b>Payment Mode:</b> ${payment.value}</p>

                <p class="success">Payment Successful</p>

                <hr>

                <p>Thank You Visit Again!</p>

            `;
        }

    </script>

</body>
</html>
